<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>もぐって野菜ハント</title>
    <link rel="stylesheet" href="style.css?v=20260707-stage-clear" />
  </head>
  <body>
    <main class="game-shell">
      <section class="hud" aria-label="ゲーム情報">
        <div>
          <p class="label">回収</p>
          <p><span id="collected">0</span>/<span id="total">0</span></p>
        </div>
        <div>
          <p class="label">危険度</p>
          <p><span id="danger">低</span></p>
        </div>
        <div>
          <p class="label">ステージ</p>
          <p><span id="stage">1</span>/5</p>
        </div>
        <div class="message-slot">
          <p class="label">状態</p>
          <p><span id="message">クリックでスタート</span></p>
        </div>
        <button id="sound" type="button" aria-label="音を切り替える">♪</button>
        <button id="restart" type="button" aria-label="もう一度遊ぶ">↻</button>
      </section>

      <canvas id="game" width="960" height="640" aria-label="畑ゲーム"></canvas>

      <section class="controls" aria-label="操作">
        <button class="move" data-dir="up" type="button">▲</button>
        <div>
          <button class="move" data-dir="left" type="button">◀</button>
          <button id="dig" type="button">掘る</button>
          <button class="move" data-dir="right" type="button">▶</button>
        </div>
        <button class="move" data-dir="down" type="button">▼</button>
      </section>
    </main>

    <script src="game.js?v=20260707-stage-clear"></script>
  </body>
</html>
